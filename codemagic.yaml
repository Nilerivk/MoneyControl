workflows:
  ios-release:
    name: MoneyControl iOS

    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 22

    scripts:
      - npm ci
      - npm run build
      - npx cap sync ios

      - |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean archive \
            -archivePath $CM_BUILD_DIR/App.xcarchive

      - |
          mkdir -p $CM_BUILD_DIR/Payload
          cp -R $CM_BUILD_DIR/App.xcarchive/Products/Applications/App.app $CM_BUILD_DIR/Payload/
          cd $CM_BUILD_DIR
          zip -r App.ipa Payload

    artifacts:
      - $CM_BUILD_DIR/App.ipa