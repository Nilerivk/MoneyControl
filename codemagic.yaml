workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20

    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
      - cd ios/App
      - pod install

    artifacts:
      - ios/App/build/**/*.ipa
      - ios/App/build/**/*.app